project: xe-hne-fus-expr-v0
output_dir: figures/eval/expression-hvg-50
filters:
  target: expression
  name: beat
  items_path: cells.json
  metadata_paths:
    - cells/outer=0-inner=0-seed=0.parquet
    - cells/outer=1-inner=0-seed=0.parquet
    - cells/outer=2-inner=0-seed=0.parquet
    - cells/outer=3-inner=0-seed=0.parquet
  panel_paths:
    - hvg-50/cells/outer=0-inner=0-seed=0.yaml
    - hvg-50/cells/outer=1-inner=0-seed=0.yaml
    - hvg-50/cells/outer=2-inner=0-seed=0.yaml
    - hvg-50/cells/outer=3-inner=0-seed=0.yaml
baseline: vision
parameter_columns:
  - config.backbone.fusion_stage
  - config.backbone.fusion_strategy
  - config.backbone.freeze_morph_encoder
  - config.data.expr_pool
color_by_splits: true
