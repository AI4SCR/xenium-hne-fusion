task:
  target: expression

head:
  num_hidden_layers: 0

backbone:
  morph_encoder_name: vit_small_patch16_224
  morph_encoder_kws:
    img_size: 256
  expr_encoder_name: mlp
  expr_encoder_kws:
    output_dim: 32
    num_hidden_layers: 1
    dropout: 0.1
  fusion_strategy: add
  fusion_stage: early
  use_proj: true
  global_pool: token

data:
  name: hest1k
  batch_size: 256
  expr_pool: token
  items_path: items/lung.json
  metadata_path: lung/outer=0-seed=0.parquet
  panel_path: hvg-lung-default-outer=0-seed=0.yaml

lit:
  target_key: target
  lr_head: 1.0e-4
  lr_backbone: 1.0e-5

wandb:
  project: debug
  name: early-fusion
  tags: [lung]

trainer:
  max_time: 00:01:45:00
  max_epochs: 35
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0
