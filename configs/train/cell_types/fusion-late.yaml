task: cell_type_prediction

head:
  output_dim: 39
  num_hidden_layers: 0

backbone:
  morph_encoder_name: vit_small_patch16_224
  expr_encoder_name: mlp
  expr_encoder_kws:
    output_dim: 32
    num_hidden_layers: 1
    dropout: 0.1
  fusion_strategy: add
  fusion_stage: late
  use_proj: true
  global_pool: null
  morph_token_pool: token
  expr_token_pool: avg

data:
  name: beat
  batch_size: 256
  expr_pool: token
  metadata_path: splits/default.parquet
  panel_path: default.yaml

lit:
  target_key: metadata.cell_type_target
  lr_head: 1.0e-4
  lr_backbone: 1.0e-5

wandb:
  project: debug

trainer:
  max_time: 00:01:45:00
  max_epochs: 35
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0
