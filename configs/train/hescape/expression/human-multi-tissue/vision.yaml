task:
  target: expression

head:
  num_hidden_layers: 0

backbone:
  morph_encoder_name: vit_small_patch16_224
  morph_encoder_kws:
    img_size: 224
  expr_encoder_name: null
  expr_encoder_kws: null
  fusion_strategy: null
  fusion_stage: null
  use_proj: false
  learnable_gate: false
  expr_token_pool: null
  morph_token_pool: null
  global_pool: token

data:
  name: hest1k
  num_workers: 10
  batch_size: 256
  expr_pool: tile
  items_path: all.json
  metadata_path: hescape/human-multi-tissue/hescape.parquet
  panel_path: hescape/human-multi-tissue.yaml
  cache_dir: $TMPDIR/cache

lit:
  target_key: target
  lr_head: 1.0e-4
  lr_backbone: 1.0e-5

wandb:
  project: xe-hne-fus-expr-v0
  name: vision
  tags: [hescape, human-multi-tissue]

trainer:
  max_time: 00:03:45:00
  max_epochs: 35
  accumulate_grad_batches: 2
  gradient_clip_val: 1.0
